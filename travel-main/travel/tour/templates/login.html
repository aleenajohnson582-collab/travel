<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BusEase</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body id="login-body">

    <div id="homeLinkWrapper">
        <a href="{% url 'index' %}" id="homeLink">&larr; Back to Home</a>
    </div>

    <div id="loginContainer">
        <h2 id="loginTitle">Login</h2>

        {% if messages %}
        <div id="messageBox">
            {% for message in messages %}
            <p class="{% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" id="loginForm">
            {% csrf_token %}

            <div class="form-group">
                <label id="emailLabel" for="username">Email</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label id="passwordLabel" for="passwordInput">Password</label>
                <input type="password" id="passwordInput" name="password" required>
            </div>

            <button type="submit" id="loginButton">Login</button>
        </form>

        <div id="signupWrapper">
            <p>
                Don't have an account?
                <a href="{% url 'signup' %}" id="signupLink">Sign Up</a>
            </p>
        </div>
    </div>

</body>
</html>
