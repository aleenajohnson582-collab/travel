{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body id="view_booking_body">

<div class="top-bar">
    <a href="{% url 'home' %}" class="booking-btn">&larr; Back to Home</a>
</div>

<h2 class="title">My Bookings</h2>

<div class="booking-container">
    {% for b in bookings %}
    <div class="booking-card">
        <h3 class="route">{{ b.from_place }} &rarr; {{ b.to_place }}</h3>
        <p><b>Name:</b> {{ b.name }}</p>
        <p><b>Date:</b> {{ b.travel_date }}</p>
        <p><b>Seats:</b> {{ b.seats }}</p>
        <p><b>Bus:</b> {{ b.bus_name }}</p>
        <p><b>Time:</b> {{ b.travel_time }}</p>
    </div>
    {% empty %}
    <p class="empty">No bookings found</p>
    {% endfor %}
</div>

</body>
</html>
