<!DOCTYPE html>
<html>
<head>
    <title>Bus Booking</title>
</head>
<body>

    <h1>Book Your Ticket</h1>

    <p>Bus Name: {{ bus.name }}</p>
    <p>From: {{ bus.source }}</p>
    <p>To: {{ bus.destination }}</p>
    <p>Price: {{ bus.price }}</p>

    <form method="POST">
        {% csrf_token %}

        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Phone:</label><br>
        <input type="text" name="phone" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Select Seats:</label><br>
        <input type="checkbox" name="seats" value="A1"> A1
        <input type="checkbox" name="seats" value="A2"> A2
        <input type="checkbox" name="seats" value="A3"> A3
        <input type="checkbox" name="seats" value="A4"> A4
        <br><br>

        <button type="submit">Confirm Booking</button>
    </form>

</body>
</html>
