<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title id="page-title">Contact Us</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body id="contact-body">

    <div id="contact-container">

        <h1 id="contact-heading">Contact Us</h1>

        <p id="contact-description">
            Have any questions? We'd love to hear from you.
        </p>

        <form id="contact-form" method="POST">
            {% csrf_token %}

            <label for="contact-name">Name</label>
            <input id="contact-name" type="text" name="name" placeholder="Enter your name" required>

            <label for="contact-email">Email</label>
            <input id="contact-email" type="email" name="email" placeholder="Enter your email" required>

            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" placeholder="Write your message..." required></textarea>

            <button id="contact-submit" type="submit">Send Message</button>
        </form>

    </div>

</body>
</html>
