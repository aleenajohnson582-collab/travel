<!DOCTYPE html>
<html>
<head>
    <title>Kerala Bus Booking - Home</title>
</head>
<body>

    <h1>Kerala Bus Booking</h1>

    <form method="POST" action="/buses/">
        {% csrf_token %}

        <label>From:</label><br>
        <input type="text" name="source" required><br><br>

        <label>To:</label><br>
        <input type="text" name="destination" required><br><br>

        <button type="submit">Search Buses</button>
    </form>

</body>
</html>
