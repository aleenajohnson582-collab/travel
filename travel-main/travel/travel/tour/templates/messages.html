<h2>Contact Messages</h2>
 {% for msg in messages %}
 <div style="border: 1px solid #070101da; padding: 10px; margin-bottom: 10px;">
  <p><strong>Name:</strong> {{ msg.name }}</p>
  <p><strong>Email:</strong> {{ msg.email }}</p>
  <p><strong>Message:</strong> {{ msg.message }}</p>
 </div>
 {% endfor %}
